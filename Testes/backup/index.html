<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuckFlix</title>
<!-- FAVICON (ícone da aba) -->
  <link rel="icon" type="image/png" href="img/LOGO_pg.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- OVERLAY ESCURO -->
<div id="overlay" class="hidden"></div>

<!-- BOTÃO VOLTAR AO TOPO -->
<button id="btnTopo" title="Voltar ao topo">▲</button>

<!-- BOTÃO FLUTUANTE ROLETA -->
<button id="btnRoleta" title="Surpreenda-me!">🎲</button>

<!-- ========================
     MODAL ROLETA
======================== -->
<div id="modalRoleta" class="hidden">
  <div class="roleta-box">
    <h2>🎲 Surpreenda-me!</h2>
    <p>Escolha uma categoria e deixa a sorte decidir:</p>

    <div class="roleta-categorias">
      <button class="cat-btn" data-cat="filmes">🎬 Filmes</button>
      <button class="cat-btn" data-cat="series">📺 Séries</button>
      <button class="cat-btn" data-cat="animes">⛩️ Animes</button>
      <button class="cat-btn" data-cat="desenhos">🎨 Desenhos</button>
    </div>

    <!-- DISPLAY DA ROLETA -->
    <div id="roletaDisplay" class="hidden">
      <div id="roletaSpinner">
        <img id="roletaImg" src="" alt="">
        <p id="roletaTitulo"></p>
        <span id="roletaNota"></span>
      </div>
      <button id="btnAssistirRoleta" class="hidden">▶ Assistir agora!</button>
      <button id="btnSortearNovamente" class="hidden">🔀 Sortear novamente</button>
    </div>

    <button id="fecharRoleta">✖ Fechar</button>
  </div>
</div>

<!-- ========================
     MODAL TRAILER
======================== -->
<div id="modalTrailer" class="hidden">
  <div class="trailer-box">
    <div class="trailer-top">
      <h3 id="trailerTitulo">Trailer</h3>
      <button id="fecharTrailer">✖</button>
    </div>
    <iframe id="trailerFrame" src="" allowfullscreen></iframe>
  </div>
</div>

<!-- ========================
     HERO
======================== -->
<section class="hero">
  <header>
    <div class="logo">
      <img src="img/logo_duckflix.png" alt="DuckFlix">
    </div>

    <div class="busca-wrap">
      <div class="busca">
        <input id="busca" placeholder="Buscar filmes, séries, animes..." autocomplete="off">
        <button id="btnBusca">🔍</button>
      </div>
      <div id="sugestoes" class="hidden"></div>
    </div>

    <div class="header-btns">
      <button id="btnFav">⭐ Favoritos</button>
    </div>
  </header>
</section>

<!-- ========================
     PLAYER
======================== -->
<section id="playerArea" class="hidden">

  <div class="playerTop">
    <h2 id="tituloPlayer"></h2>
    <div class="player-top-btns">
      <button id="btnTrailer">🎬 Trailer</button>
      <button id="fecharPlayer">✖ Fechar</button>
    </div>
  </div>

  <!-- CONTROLES DE EPISÓDIO -->
  <div id="episodeControls" class="hidden">

    <div class="ep-info">
      <span>📅 Temporada <strong id="numTemporada">1</strong></span>
      <span>🎬 Episódio <strong id="numEpisodio">1</strong></span>
    </div>

    <div class="ep-btns">
      <button id="btnTemporadaMenos">⬅ Temp.</button>
      <button id="btnEpMenos">⬅ Anterior</button>
      <button id="btnEpMais">Próximo ➡</button>
      <button id="btnTemporadaMais">Temp. ➡</button>
    </div>

    <div class="ep-goto">
      <label>Ir para:</label>
      <input id="inputTemp" type="number" min="1" value="1" placeholder="Temp.">
      <input id="inputEp"   type="number" min="1" value="1" placeholder="Ep.">
      <button id="btnGoTo">▶ Ir</button>
    </div>

    <div class="timer-area">
      <span>⏱️ Auto-pular:</span>
      <button class="timer-btn ativo" data-min="0">Off</button>
      <button class="timer-btn" data-min="20">20min</button>
      <button class="timer-btn" data-min="25">25min</button>
      <button class="timer-btn" data-min="45">45min</button>
      <button class="timer-btn" data-min="60">60min</button>
      <span id="timerDisplay" class="hidden">⏳ <strong id="timerCount"></strong></span>
    </div>

  </div>

  <div id="player"></div>

  <!-- BANNER PRÓXIMO EPISÓDIO (estilo Netflix) -->
  <div id="nextEpBanner" class="hidden">
    <div class="next-ep-info">
      <span>▶ Próximo episódio em</span>
      <strong id="nextEpCount">10</strong>s
    </div>
    <div class="next-ep-bar"><div id="nextEpProgress"></div></div>
    <button id="nextEpNow">Assistir agora</button>
    <button id="nextEpCancel">✖ Cancelar</button>
  </div>

</section>

<!-- ========================
     FAVORITOS
======================== -->
<section id="favPage" class="hidden">
  <div class="favHeader">
    <h2>⭐ Favoritos</h2>
    <button id="closeFav">✖ Sair</button>
  </div>
  <div id="favList"></div>
</section>

<!-- ========================
     BUSCA PAGE
======================== -->
<section id="searchPage" class="hidden">
  <div class="favHeader">
    <h2>🔎 Resultados da Busca</h2>
    <button id="closeSearch">✖ Sair</button>
  </div>
  <div id="searchList"></div>
</section>

<!-- ========================
     CONTINUAR ASSISTINDO
======================== -->
<div id="historicoSection" class="hidden">
  <div class="cat-header">
    <h2> 🕐 Continuar Assistindo</h2>
    <button id="limparHistorico">🗑️ Limpar</button>
  </div>
  <div class="carousel">
    <button class="scroll-btn left" onclick="rolarEsquerda('historico')">‹</button>
    <div class="row" id="historico"></div>
    <button class="scroll-btn right" onclick="rolarDireita('historico')">›</button>
  </div>
</div>

<!-- ========================
     CARROSSEIS
======================== -->
<div class="cat-header">
  <img src="img/LOGO_pg.png" alt="" class="cat-icon" onerror="this.style.display='none'">
  <h2></h2>
</div>
<div class="carousel">
  <button class="scroll-btn left" onclick="rolarEsquerda('filmes')">‹</button>
  <div class="row" id="filmes"></div>
  <button class="scroll-btn right" onclick="rolarDireita('filmes')">›</button>
</div>

<div class="cat-header">
  <img src="img/logo_series.png" alt="" class="cat-icon" onerror="this.style.display='none'">
  <h2></h2>
</div>
<div class="carousel">
  <button class="scroll-btn left" onclick="rolarEsquerda('series')">‹</button>
  <div class="row" id="series"></div>
  <button class="scroll-btn right" onclick="rolarDireita('series')">›</button>
</div>

<div class="cat-header">
  <img src="img/logo_animes.png" alt="" class="cat-icon" onerror="this.style.display='none'">
  <h2></h2>
</div>
<div class="carousel">
  <button class="scroll-btn left" onclick="rolarEsquerda('animes')">‹</button>
  <div class="row" id="animes"></div>
  <button class="scroll-btn right" onclick="rolarDireita('animes')">›</button>
</div>

<div class="cat-header">
  <img src="img/logo_desenhos.png" alt="" class="cat-icon" onerror="this.style.display='none'">
  <h2></h2>
</div>
<div class="carousel">
  <button class="scroll-btn left" onclick="rolarEsquerda('desenhos')">‹</button>
  <div class="row" id="desenhos"></div>
  <button class="scroll-btn right" onclick="rolarDireita('desenhos')">›</button>
</div>

<footer>© DuckFlix for Mamutinho 🦣</footer>

<script src="script.js"></script>
</body>
</html>
